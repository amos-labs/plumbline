    <line x1="40" y1="16" x2="80" y2="16" stroke="#4F8CFF" stroke-width="4" stroke-linecap="round"/>
    <line x1="60" y1="16" x2="60" y2="74" stroke="#4F8CFF" stroke-width="2.5"/>

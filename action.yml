name: "proofgate"
description: "Proof-carrying gate for AI agent work: receipt shape check + LLM semantic review + failure-capsule rework loop."
author: "AMOS Labs"
branding:
  icon: "shield"
  color: "purple"

inputs:
  anthropic-api-key:
    description: "Anthropic API key for semantic review"
    required: true
  github-token:
    description: "Token used to post the gate comment on the PR"
    required: true
    default: ${{ github.token }}
  receipt:
    description: "Path to the proof receipt. Leave as default to auto-discover the per-PR receipt at .proofgate/receipts/<task_id>.json (one file per PR — avoids conflicts); falls back to .proofgate/receipt.json."
    required: false
    default: ".proofgate/receipt.json"
  policy:
    description: "Path to the gate policy"
    required: false
    default: ".proofgate/policy.json"

runs:
  using: "composite"
  steps:
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: "20"

    - name: Fetch base ref
      shell: bash
      run: |
        git fetch origin "${{ github.base_ref }}" --depth=200 || true

    - name: Build proofgate
      shell: bash
      working-directory: ${{ github.action_path }}
      run: npm ci && npm run build

    - name: Run gate
      shell: bash
      env:
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
        GITHUB_TOKEN: ${{ inputs.github-token }}
        PROOFGATE_PR_NUMBER: ${{ github.event.pull_request.number }}
      run: |
        node "${{ github.action_path }}/dist/cli.js" run \
          --receipt "${{ inputs.receipt }}" \
          --policy "${{ inputs.policy }}" \
          --base "origin/${{ github.base_ref }}"

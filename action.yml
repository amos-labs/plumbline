name: "Plumbline Gate"
description: "Mission-alignment gate for AI agent PRs: proof receipts, deterministic checks, semantic review, and failure capsules."
author: "AMOS Labs"
branding:
  icon: "target"
  color: "blue"

inputs:
  anthropic-api-key:
    description: "Anthropic API key for semantic review"
    required: true
  github-token:
    description: "Token used to post the gate comment on the PR"
    required: true
    default: ${{ github.token }}
  receipt:
    description: "Path to the proof receipt. Leave as default (auto) to discover the per-PR receipt at .plumbline/receipts/<task_id>.json — legacy .proofgate/ repos work unchanged."
    required: false
    default: "auto"
  policy:
    description: "Path to the gate policy (auto-resolves .plumbline/ or legacy .proofgate/)"
    required: false
    default: ".plumbline/policy.json"
  phase:
    description: "Phased gate stage: full (default, all-in-one), quality (phase 1: shape + semantic, ci-evidence skipped — tests not yet run), or verify (phase 2: ci-evidence + terminal verdict). See templates/workflow-staged.yml."
    required: false
    default: "full"

runs:
  using: "composite"
  steps:
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: "20"

    - name: Fetch base ref
      shell: bash
      run: |
        git fetch origin "${{ github.base_ref }}" --depth=200 || true

    - name: Run gate
      shell: bash
      env:
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
        GITHUB_TOKEN: ${{ inputs.github-token }}
        PLUMBLINE_PR_NUMBER: ${{ github.event.pull_request.number }}
      # Runs the committed prebuilt bundle (dist/index.js) directly — no
      # `npm ci` / `npm run build` at runtime. The bundle is self-contained
      # (dependencies inlined) and kept in sync with src/ by the dist-check
      # CI job.
      run: |
        node "${{ github.action_path }}/dist/index.js" run \
          --receipt "${{ inputs.receipt }}" \
          --policy "${{ inputs.policy }}" \
          --phase "${{ inputs.phase }}" \
          --base "origin/${{ github.base_ref }}"

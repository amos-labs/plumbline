name: Release

# Cut a GitHub Release when a semver tag is pushed. The tag is the trigger; a human
# creates it deliberately (see "Cutting a release" in RELEASING below / README).
#
# This workflow does NOT create tags. It reacts to a pushed `v*` tag by building,
# testing, and publishing a GitHub Release with notes from CHANGELOG.md.
on:
  push:
    tags:
      - "v*.*.*"   # full semver tags only (v0.2.0). Moving major/minor tags (v0, v1)
                   # are aliases a human fast-forwards after the release — see RELEASING.

permissions:
  contents: write   # create the Release and upload assets

jobs:
  release:
    name: build + release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      # Fail fast if the tag and package.json disagree — a release must be honest about
      # its own version. Tag `v0.2.0` must match package.json version `0.2.0`.
      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          echo "tag=$TAG package.json=$PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag $GITHUB_REF_NAME (=$TAG) does not match package.json version $PKG. Bump package.json version to match before tagging."
            exit 1
          fi

      # Pull this version's section out of CHANGELOG.md for the release body. Falls back
      # to auto-generated notes if the version has no changelog entry.
      - name: Extract changelog section
        id: notes
        run: |
          VER="${GITHUB_REF_NAME#v}"
          if awk -v ver="$VER" '
            $0 ~ "^## \\[" ver "\\]" {p=1; next}
            p && /^## \[/ {exit}
            p {print}
          ' CHANGELOG.md > release-notes.md && [ -s release-notes.md ]; then
            echo "have_notes=true" >> "$GITHUB_OUTPUT"
          else
            echo "have_notes=false" >> "$GITHUB_OUTPUT"
          fi

      # If a build artifact exists (e.g. a bundled dist tarball produced by the build —
      # owned by the packaging PR #24), package and attach it so the Release is
      # verifiable/installable without a build step. Absent, the Release is source-only,
      # which is fine: the composite action builds from source at use time.
      - name: Package dist artifact (if present)
        id: artifact
        run: |
          if [ -d dist ] && [ -n "$(ls -A dist 2>/dev/null)" ]; then
            tar -czf "plumbline-${GITHUB_REF_NAME}-dist.tgz" dist templates action.yml package.json README.md LICENSE THIRD-PARTY.md
            sha256sum "plumbline-${GITHUB_REF_NAME}-dist.tgz" > "plumbline-${GITHUB_REF_NAME}-dist.tgz.sha256"
            echo "asset=plumbline-${GITHUB_REF_NAME}-dist.tgz" >> "$GITHUB_OUTPUT"
            echo "has_asset=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_asset=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARGS=(release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --verify-tag)
          if [ "${{ steps.notes.outputs.have_notes }}" = "true" ]; then
            ARGS+=(--notes-file release-notes.md)
          else
            ARGS+=(--generate-notes)
          fi
          if [ "${{ steps.artifact.outputs.has_asset }}" = "true" ]; then
            ARGS+=("${{ steps.artifact.outputs.asset }}" "${{ steps.artifact.outputs.asset }}.sha256")
          fi
          gh "${ARGS[@]}"
